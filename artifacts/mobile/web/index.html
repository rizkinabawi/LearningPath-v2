<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>LearningPath</title>
    <meta name="description" content="Belajar lebih cerdas dengan flashcard dan quiz" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        height: 100%;
        background: #F4F7FF;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #F4F7FF;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      .logo-wrap {
        width: 88px;
        height: 88px;
        border-radius: 26px;
        background: linear-gradient(135deg, #4C6FFF, #7C47FF);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 32px rgba(76, 111, 255, 0.28);
        margin-bottom: 24px;
        animation: pop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      }

      .logo-icon {
        font-size: 40px;
        line-height: 1;
        user-select: none;
      }

      .app-name {
        font-size: 26px;
        font-weight: 800;
        color: #0F1F3D;
        letter-spacing: -0.5px;
        margin-bottom: 6px;
        animation: fadeUp 0.5s 0.15s ease both;
      }

      .app-tagline {
        font-size: 14px;
        color: #99AAC3;
        margin-bottom: 48px;
        animation: fadeUp 0.5s 0.25s ease both;
      }

      .dots {
        display: flex;
        gap: 8px;
        animation: fadeUp 0.5s 0.35s ease both;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #4C6FFF;
        animation: bounce 1.2s ease-in-out infinite;
      }
      .dot:nth-child(2) { animation-delay: 0.18s; background: #38BDF8; }
      .dot:nth-child(3) { animation-delay: 0.36s; background: #7C3AED; }

      .loading-bar-wrap {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: #E6ECF8;
      }
      .loading-bar {
        height: 100%;
        background: linear-gradient(90deg, #4C6FFF, #38BDF8, #7C3AED);
        background-size: 200% 100%;
        animation: slide 1.6s ease-in-out infinite;
        width: 40%;
        border-radius: 0 2px 2px 0;
      }

      @keyframes pop {
        from { transform: scale(0.7); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes bounce {
        0%, 80%, 100% { transform: translateY(0); opacity: 0.6; }
        40%            { transform: translateY(-10px); opacity: 1; }
      }
      @keyframes slide {
        0%   { margin-left: -40%; }
        100% { margin-left: 100%; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="logo-wrap">
        <span class="logo-icon">🎓</span>
      </div>
      <div class="app-name">LearningPath</div>
      <div class="app-tagline">Belajar lebih cerdas setiap hari</div>
      <div class="dots">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="loading-bar-wrap">
        <div class="loading-bar"></div>
      </div>
    </div>

    <div id="root"></div>

    <script>
      // Hide splash once React app has mounted
      var _splash = document.getElementById('splash');
      var _observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          _observer.disconnect();
          _splash.classList.add('fade-out');
          setTimeout(function() { _splash.style.display = 'none'; }, 450);
        }
      });
      _observer.observe(document.getElementById('root'), { childList: true, subtree: true });
    </script>
  </body>
</html>
